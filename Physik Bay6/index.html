<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 Das große Physik-Abenteuer (MS/AHS Unterstufe)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            background-color: #1e293b;
            color: white;
            /* Entfernt die Scrollbar des Hauptfensters */
            overflow: hidden; 
        }

        /* --- Seitenleiste (Navigation) --- */
        #sidebar {
            width: 300px;
            min-width: 300px;
            background-color: #0f172a;
            overflow-y: auto;
            box-shadow: 4px 0 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            z-index: 10;
            transition: margin-left 0.3s ease; /* Animation für das Einklappen */
        }

        /* Klasse zum Ausblenden */
        #sidebar.collapsed {
            margin-left: -300px;
        }

        .sidebar-header {
            padding: 20px;
            text-align: center;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-bottom: 2px solid #1e40af;
        }

        .sidebar-header h1 {
            margin: 0;
            font-size: 1.3em;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        /* --- Toggle Button --- */
        #menu-toggle {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 100;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 12px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            font-size: 1.2em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #menu-toggle:hover {
            background: #2563eb;
        }

        .grade-section {
            padding: 15px 20px 5px 20px;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
            border-bottom: 1px solid #334155;
            margin-top: 10px;
            font-weight: bold;
        }

        /* --- Navigations-Buttons --- */
        .nav-btn {
            background: transparent;
            color: #cbd5e0;
            border: none;
            width: 100%;
            text-align: left;
            padding: 15px 20px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 4px solid transparent;
        }

        .nav-btn:hover {
            background-color: #1e293b;
            color: white;
            border-left: 4px solid #3b82f6;
        }

        .nav-btn.active {
            background-color: #1e293b;
            color: #60a5fa;
            border-left: 4px solid #60a5fa;
            font-weight: bold;
        }

        /* --- Hauptbereich (iFrame) --- */
        #content-area {
            flex-grow: 1;
            background-color: #f8fafc;
            position: relative;
            height: 100vh;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #ffffff;
        }
    </style>
</head>
<body>

    <button id="menu-toggle" onclick="toggleMenu()" title="Menü ein/ausblenden">
        ☰
    </button>

    <div id="sidebar">
        <div class="sidebar-header">
            <h1 style="margin-top: 40px;">🚀 Physik-Abenteuer</h1>
            <p style="margin: 5px 0 0 0; font-size: 0.8em; color: #dbeafe;">Österreichischer Lehrplan</p>
        </div>

        <div class="grade-section">📚 2. Klasse (6. Schulstufe)</div>
        <button class="nav-btn active" onclick="loadPage('licht, schatten, astronomie.html', this)">
            🌑 1. Licht & Schatten
        </button>
        <button class="nav-btn" onclick="loadPage('farben.html', this)">
            🌈 2. Farben
        </button>
        <button class="nav-btn" onclick="loadPage('akustik.html', this)">
            🎶 3. Akustik
        </button>
        <button class="nav-btn" onclick="loadPage('elektrizität.html', this)">
            ⚡ 4. Elektrizität
        </button>
        <button class="nav-btn" onclick="loadPage('optik1.html', this)">
            🌈 5. Optik-Abenteuer
        </button>

        <div class="grade-section">📚 3. Klasse (7. Schulstufe)</div>
        <button class="nav-btn" onclick="loadPage('kraft und bewegung.html', this)">
            🚀 6. Kraft & Bewegung
        </button>
        <button class="nav-btn" onclick="loadPage('drehundstatik.html', this)">
            🎡 7. Drehbewegungen & Statik
        </button>
        <button class="nav-btn" onclick="loadPage('energie.html', this)">
            🔋 8. Energie
        </button>
        <button class="nav-btn" onclick="loadPage('arbeit.html', this)">
            🏗 9. Arbeit
        </button>

        <div class="grade-section">📚 4. Klasse (8. Schulstufe)</div>
        <button class="nav-btn" onclick="loadPage('elektromagnetismus.html', this)">
            🧲 10. Elektromagnetismus
        </button>
        <button class="nav-btn" onclick="loadPage('linsen, spiegel.html', this)">
            🔍 11. Linsen & Spiegel
        </button>
        <button class="nav-btn" onclick="loadPage('astronomie.html', this)">
            🌌 12. Astronomie & Astrophysik
        </button>

        <div class="grade-section">🛠️ Werkzeuge & Grundlagen</div>
        <button class="nav-btn" onclick="loadPage('sieinheiten.html', this)">
            📏 SI-Einheiten
        </button>
        <button class="nav-btn" onclick="loadPage('rechenbeispiele.html', this)">
            🧮 Rechenbeispiele
        </button>
    </div>

    <div id="content-area">
        <iframe id="game-frame" src="licht, schatten, astronomie.html" title="Physik Spiel"></iframe>
    </div>

    <script>
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
        }

        function loadPage(fileName, btnElement) {
            document.getElementById('game-frame').src = fileName;

            let buttons = document.getElementsByClassName('nav-btn');
            for (let i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('active');
            }
            btnElement.classList.add('active');

            // Optional: Menü auf Mobilgeräten automatisch schließen nach Klick
            if (window.innerWidth < 768) {
                toggleMenu();
            }
        }
    </script>
</body>
</html>
