<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        body { padding-top: 50px; text-align: center; }
        .dashboard-card { background: white; padding: 40px; border-radius: 20px; color: #2d3748; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: 0 auto; }
        h1 { color: #FF9800; font-size: 3em; margin-bottom: 10px; }
        .score-display { font-size: 4em; font-weight: bold; color: #4CAF50; margin: 20px 0; }
        .reset-btn { background: #E91E63; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="dashboard-card">
        <h1>📊 Dein Physik-Diplom</h1>
        <p>Hier siehst du deinen gesamten Fortschritt über alle Themen hinweg!</p>
        <div class="score-display" id="final-score">0</div>
        <h3>Gesammelte Punkte</h3>
        <p>Fantastisch! Du bist ein echter Experte.</p>
        <button class="reset-btn" onclick="resetProgress()">Alle Punkte zurücksetzen</button>
    </div>

    <script>
        function updateDisplay() {
            let score = parseInt(localStorage.getItem('physik_score')) || 0;
            document.getElementById('final-score').innerText = score;
        }

        function resetProgress() {
            if(confirm("Bist du sicher? Alle Punkte werden gelöscht!")) {
                localStorage.removeItem('physik_score');
                updateDisplay();
                window.parent.postMessage({ type: 'updateScore', score: 0 }, '*');
            }
        }

        document.addEventListener('DOMContentLoaded', updateDisplay);
    </script>
</body>
</html>
