<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 Das große Physik-Abenteuer (MS/AHS Unterstufe)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            background-color: #1e293b;
            color: white;
            overflow: hidden;
        }

        /* --- Toggle Button --- */
        #menu-toggle {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 100;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 12px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            font-size: 1.2em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #menu-toggle:hover {
            background: #2563eb;
        }

        /* --- Seitenleiste (Navigation) --- */
        #sidebar {
            width: 320px;
            min-width: 320px;
            background-color: #0f172a;
            overflow-y: auto;
            box-shadow: 4px 0 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            z-index: 10;
            transition: margin-left 0.3s ease;
        }

        #sidebar.collapsed {
            margin-left: -320px;
        }

        .sidebar-header {
            padding: 20px;
            text-align: center;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-bottom: 2px solid #1e40af;
        }

        .sidebar-header h1 {
            margin: 0;
            font-size: 1.5em;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .grade-section {
            padding: 15px 20px 5px 20px;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
            border-bottom: 1px solid #334155;
            margin-top: 10px;
            font-weight: bold;
        }

        /* --- Navigations-Buttons --- */
        .nav-btn {
            background: transparent;
            color: #cbd5e0;
            border: none;
            width: 100%;
            text-align: left;
            padding: 15px 20px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 4px solid transparent;
        }

        .nav-btn:hover {
            background-color: #1e293b;
            color: white;
            border-left: 4px solid #3b82f6;
        }

        .nav-btn.active {
            background-color: #1e293b;
            color: #60a5fa;
            border-left: 4px solid #60a5fa;
            font-weight: bold;
        }

        /* Language Buttons */
        .lang-btn {
            background: #334155;
            color: #94a3b8;
            border: 1px solid #475569;
            padding: 5px 10px;
            font-size: 0.8em;
            cursor: pointer;
            border-radius: 4px;
            margin: 0 2px;
            transition: all 0.2s;
        }

        .lang-btn:hover {
            background: #475569;
            color: white;
        }

        .lang-btn.active {
            background: #3b82f6;
            color: white;
            border-color: #60a5fa;
        }

        /* --- Hauptbereich (iFrame) --- */
        #content-area {
            flex-grow: 1;
            background-color: #f8fafc;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #ffffff;
        }
    </style>
</head>

        <button class="nav-btn" data-page="sieinheiten.html" onclick="loadPage('sieinheiten.html', this)">

        function setLanguage(lang) {
            currentLang = lang;
            
            // Update Site Direction (RTL for Arabic)
            document.body.dir = (lang === 'ar') ? 'rtl' : 'ltr';
            document.getElementById('sidebar').style.borderLeft = (lang === 'ar') ? 'none' : '';
            document.getElementById('sidebar').style.borderRight = (lang === 'ar') ? '4px solid transparent' : '';

            // Update Text
            document.getElementById('site-title').innerText = translations[lang]['site-title'];
            document.getElementById('site-subtitle').innerText = translations[lang]['site-subtitle'];
            document.getElementById('section-2').innerText = translations[lang]['section-2'];
            document.getElementById('section-3').innerText = translations[lang]['section-3'];
            document.getElementById('section-4').innerText = translations[lang]['section-4'];
            document.getElementById('section-extra').innerText = translations[lang]['section-extra'];

            // Update Navigation Buttons
            const buttons = document.querySelectorAll('.nav-btn');
            buttons.forEach(btn => {
                const page = btn.getAttribute('data-page');
                btn.querySelector('.btn-text').innerText = translations[lang]['pages'][page];
            });

            // Update Active Lang Button
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + lang).classList.add('active');

            // Reload current page in new language
            const activeBtn = document.querySelector('.nav-btn.active');
            if (activeBtn) {
                loadPage(activeBtn.getAttribute('data-page'), activeBtn);
            }
        }

        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
        }

        function loadPage(fileName, btnElement) {
            let targetFile = fileName;
            if (currentLang !== 'de') {
                targetFile = fileName.replace('.html', '_' + currentLang + '.html');
                // Standardize filenames for non-German versions
                targetFile = targetFile.replace('elektrizität', 'elektrizitaet');
                targetFile = targetFile.replace('wärmelehre', 'waermelehre');
            }

            document.getElementById('game-frame').src = targetFile;

            let buttons = document.getElementsByClassName('nav-btn');
            for (let i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('active');
            }
            btnElement.classList.add('active');

            // Optional: Menü auf Mobilgeräten automatisch schließen nach Klick
            if (window.innerWidth < 768) {
                toggleMenu();
            }
        }

        // Initialize
        setLanguage('de');
