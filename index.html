<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 Das große Physik-Abenteuer (MS/AHS Unterstufe)</title>
    <link rel="stylesheet" href="css/style.css?v=1.1">
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background-color: #1e293b; color: white; overflow: hidden; }
        #sidebar { width: 320px; background-color: #0f172a; overflow-y: auto; display: flex; flex-direction: column; transition: margin-left 0.3s; box-shadow: 4px 0 15px rgba(0,0,0,0.3); z-index: 10; }
        #sidebar.collapsed { margin-left: -320px; }
        .sidebar-header { padding: 60px 20px 20px 20px; text-align: center; background: linear-gradient(135deg, #3b82f6, #2563eb); border-bottom: 2px solid #1e40af; }
        .sidebar-header h1 { margin: 10px 0; font-size: 1.4em; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .grade-section { padding: 15px 20px 5px 20px; font-size: 0.85em; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; border-bottom: 1px solid #334155; margin-top: 10px; font-weight: bold; }
        .nav-btn { background: transparent; color: #cbd5e0; border: none; width: 100%; text-align: left; padding: 12px 20px; cursor: pointer; border-left: 4px solid transparent; transition: all 0.2s; font-size: 0.95em; }
        .nav-btn:hover, .nav-btn.active { background-color: #1e293b; color: white; border-left: 4px solid #3b82f6; }
        .nav-btn.active { color: #60a5fa; font-weight: bold; }
        #content-area { flex-grow: 1; position: relative; }
        iframe { width: 100%; height: 100%; border: none; background-color: white; }
        #zeugnis-btn { position: fixed; top: 8px; right: 20px; z-index: 1000; background: linear-gradient(135deg, #FFD700, #FF9800); padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; border: 2px solid white; color: #1e293b; box-shadow: 0 4px 15px rgba(255, 152, 0, 0.4); display: flex; align-items: center; gap: 8px; transition: transform 0.2s; }
        #zeugnis-btn:hover { transform: scale(1.05); }
        #menu-toggle { position: fixed; top: 15px; left: 15px; z-index: 100; background: #3b82f6; color: white; border: none; padding: 10px 12px; border-radius: 5px; cursor: pointer; }
        .lang-btn { background: #334155; color: white; border: 1px solid #475569; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8em; }
        .lang-btn.active { background: #3b82f6; border-color: #60a5fa; }
    </style>
</head>
<body>
    <button id="menu-toggle" onclick="toggleMenu()">☰</button>
    <button id="zeugnis-btn" onclick="loadPage('topics/dashboard.html', null)">🎓 Mein Zeugnis</button>
    <div id="sidebar">
        <div class="sidebar-header">
            <div style="display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; padding: 5px 0 15px 0;">
                <button onclick="setLanguage('de')" class="lang-btn" id="lang-de">DE</button>
                <button onclick="setLanguage('en')" class="lang-btn" id="lang-en">EN</button>
                <button onclick="setLanguage('ar')" class="lang-btn" id="lang-ar">AR</button>
                <button onclick="setLanguage('uk')" class="lang-btn" id="lang-uk">UK</button>
                <button onclick="setLanguage('sr')" class="lang-btn" id="lang-sr">SR</button>
                <button onclick="setLanguage('tr')" class="lang-btn" id="lang-tr">TR</button>
            </div>
            <h1>🚀 Physik-Abenteuer</h1>
            <div style="margin-top: 10px; background: #1e293b; padding: 15px; border-radius: 12px; border: 1px solid #3b82f6; box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);">
                <div style="font-size: 1.2em; font-weight: bold; color: #fbbf24; margin-bottom: 10px; text-align: center;">
                    🏆 <span id="global-score-val">0</span> Punkte
                </div>
                <div style="display: flex; gap: 5px;">
                    <button onclick="toggleDarkMode()" style="flex: 1; background: #475569; font-size: 0.75em; padding: 8px; border: none; color: white; border-radius: 6px; cursor: pointer;">Nachtmodus 🌙</button>
                    <button onclick="resetProgress()" style="flex: 1; background: #e53e3e; font-size: 0.75em; padding: 8px; border: none; color: white; border-radius: 6px; cursor: pointer;">Reset 🔄</button>
                </div>
            </div>
        </div>
        <div class="grade-section">📚 2. Klasse (6. Schulstufe)</div>
        <button class="nav-btn" onclick="loadPage('licht_schatten_astronomie', this)">🌑 1. Licht & Schatten</button>
        <button class="nav-btn" onclick="loadPage('farben', this)">🌈 2. Farben</button>
        <button class="nav-btn" onclick="loadPage('akustik', this)">🎶 3. Akustik</button>
        <button class="nav-btn" onclick="loadPage('elektrizitaet', this)">⚡ 4. Elektrizität</button>
        <button class="nav-btn" onclick="loadPage('astronomie', this)">🌌 5. Astronomie</button>
        <div class="grade-section">📚 3. Klasse (7. Schulstufe)</div>
        <button class="nav-btn" onclick="loadPage('kraft_und_bewegung', this)">🚀 6. Kraft & Bewegung</button>
        <button class="nav-btn" onclick="loadPage('drehundstatik', this)">🎡 7. Drehbewegungen & Statik</button>
        <button class="nav-btn" onclick="loadPage('energie', this)">🔋 8. Energie</button>
        <button class="nav-btn" onclick="loadPage('arbeit', this)">🏗 9. Arbeit</button>
        <div class="grade-section">📚 4. Klasse (8. Schulstufe)</div>
        <button class="nav-btn" onclick="loadPage('elektromagnetismus', this)">🧲 10. Elektromagnetismus</button>
        <button class="nav-btn" onclick="loadPage('linsen_spiegel', this)">🔍 11. Linsen & Spiegel</button>
        <button class="nav-btn" onclick="loadPage('optik1', this)">🔭 12. Optik Vertiefung</button>
        <div class="grade-section">⚙️ Sonstiges</div>
        <button class="nav-btn" onclick="loadPage('waermelehre', this)">🌡️ Wärmelehre</button>
        <button class="nav-btn" onclick="loadPage('sieinheiten', this)">📏 SI-Einheiten</button>
        <button class="nav-btn" onclick="loadPage('rechenbeispiele', this)">🧮 Rechenbeispiele</button>
        <button class="nav-btn" onclick="loadPage('topics/glossar.html', this)">📖 Glossar</button>
    </div>
    <div id="content-area"><iframe id="game-frame" title="Physik Spiel"></iframe></div>
    <script>
        window.addEventListener('message', (e) => {
            if (e.data.type === 'updateScore') document.getElementById('global-score-val').innerText = e.data.score;
            if (e.data.type === 'navigate') loadPage(e.data.page, null);
        });
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('collapsed'); }
        function setLanguage(l) {
            localStorage.setItem('physik_lang', l);
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            const btn = document.getElementById('lang-' + l);
            if (btn) btn.classList.add('active');
            const f = document.getElementById('game-frame');
            if (f.src) f.contentWindow.location.reload();
        }
        function loadPage(f, b) {
            localStorage.setItem('physik_current_page', f);
            let url = f;
            if (!f.includes('/') && !f.includes('.html')) {
                url = `topics/template.html?topic=${encodeURIComponent(f)}`;
            } else if (f.startsWith('topics/') && !['dashboard','glossar','template'].some(x => f.includes(x))) {
                const topicId = f.replace('topics/','').replace('.html','').replace(/[\s,]+/g, '_');
                url = `topics/template.html?topic=${encodeURIComponent(topicId)}`;
            }
            const frame = document.getElementById('game-frame');
            frame.src = url;
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            if (b) {
                b.classList.add('active');
                frame.title = "Aktuelles Thema: " + b.innerText.trim();
            } else {
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    if (btn.getAttribute('onclick') && btn.getAttribute('onclick').includes(f)) {
                        btn.classList.add('active');
                        frame.title = "Aktuelles Thema: " + btn.innerText.trim();
                    }
                });
            }
        }
        function toggleDarkMode() {
            let isDark = localStorage.getItem('physik_dark_mode') === 'true';
            localStorage.setItem('physik_dark_mode', !isDark);
            location.reload(); 
        }
        function resetProgress() {
            if (confirm("Möchtest du wirklich deinen gesamten Fortschritt und alle Punkte löschen?")) {
                localStorage.removeItem('physik_score');
                localStorage.removeItem('physik_answered');
                localStorage.removeItem('physik_topic_scores');
                location.reload();
            }
        }
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('global-score-val').innerText = localStorage.getItem('physik_score') || 0;
            const lang = localStorage.getItem('physik_lang') || 'de';
            setLanguage(lang);
            if (localStorage.getItem('physik_dark_mode') === 'true') document.documentElement.setAttribute('data-theme', 'dark');
            const savedPage = localStorage.getItem('physik_current_page') || 'licht_schatten_astronomie';
            loadPage(savedPage, null);
        });
    </script>
</body>
</html>
